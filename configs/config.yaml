dataset_path: data/raw

processed_path: data/processed

random_seed: 42

window_size: 30

batch_size: 64

epochs: 100

learning_rate: 0.001

datasets:
  - FD001
  - FD002
  - FD003
  - FD004

# Remaining Useful Life (RUL)
rul:
  cap_enabled: true
  cap_value: 125

# Feature Selection
feature_selection:

  remove_constant: true

  variance_threshold: 0.001

  manual_remove: []

# Feature Scaling
scaling:
  enabled: true

  method: standard      # standard | minmax

  save_scaler: true

  scaler_path: models/scalers

# Sequence Generation
sequence:
  enabled: true
  window_size: 30
  stride: 1
  
train_test_split:
  test_size: 0.20
  random_state: 42
  shuffle: true
  
# XGBoost Configuration
xgboost:
  objective: reg:squarederror

  n_estimators: 500

  learning_rate: 0.05

  max_depth: 6

  subsample: 0.8

  colsample_bytree: 0.8

  random_state: 42

  n_jobs: -1

  save_model: true

  model_path: models/xgboost